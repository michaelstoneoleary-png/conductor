services:
  - type: web
    name: conductor-backend
    env: node
    plan: starter
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    # Run migrations before starting so a fresh Postgres is always up to date
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: conductor-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORT
        value: 8080

  - type: worker
    name: conductor-worker
    env: node
    plan: starter
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: conductor-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: conductor-frontend
    env: node
    plan: starter
    rootDir: frontend
    buildCommand: npm install && npm run build
    # Use $PORT so Render's dynamic port assignment is respected
    startCommand: node_modules/.bin/next start -p $PORT -H 0.0.0.0
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          name: conductor-backend
          type: web
          # hostWithScheme gives the full https:// URL, not just the bare hostname
          property: hostWithScheme

databases:
  - name: conductor-db
    plan: basic-256mb
